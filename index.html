<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Flappy Kiro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    canvas { display: block; image-rendering: pixelated; }

    #overlay {
      position: absolute;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
    }
    #overlay h1 { font-size: 2.4rem; text-shadow: 2px 2px 6px #000; }
    #overlay input, #overlay select {
      padding: 8px 14px; border-radius: 8px; border: none;
      font-size: 1rem; text-align: center; width: 200px;
    }
    #overlay button {
      padding: 10px 28px; border-radius: 10px; border: none;
      background: #4caf50; color: #fff; font-size: 1rem; cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,.4);
    }
    #overlay button:hover { background: #388e3c; }
    #overlay button.secondary { background: #1976d2; }
    #overlay button.secondary:hover { background: #0d47a1; }

    #scores-panel {
      background: rgba(0,0,0,.75); border-radius: 12px;
      padding: 16px 28px; max-height: 220px; overflow-y: auto;
      font-size: 0.95rem; min-width: 220px;
    }
    #scores-panel h2 { margin-bottom: 8px; text-align: center; }
    #scores-panel ol { padding-left: 20px; }
    #scores-panel li { padding: 2px 0; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <!-- MENU OVERLAY -->
  <div id="overlay">
    <div id="menu-screen">
      <h1>🐧 Flappy Kiro</h1>
      <select id="user-select" class="hidden">
        <option value="">— or pick existing —</option>
      </select>
      <input id="name-input" type="text" placeholder="Enter your name" maxlength="20" autocomplete="off" />
      <button id="btn-play">Play</button>
      <button id="btn-scores" class="secondary">High Scores</button>
    </div>

    <div id="scores-screen" class="hidden">
      <div id="scores-panel">
        <h2>🏆 High Scores</h2>
        <ol id="scores-list"></ol>
      </div>
      <button id="btn-back">Back</button>
    </div>

    <div id="gameover-screen" class="hidden">
      <h1>Game Over</h1>
      <p id="gameover-msg" style="font-size:1.1rem; text-shadow:1px 1px 4px #000;"></p>
      <button id="btn-retry">Play Again</button>
      <button id="btn-menu" class="secondary">Menu</button>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
