name: Deploy to GitHub Pages

# Publishes the production site to the ROOT of the gh-pages branch on every push to
# main. Per-PR previews live under gh-pages/pr-preview/ (see preview.yml) — this job
# keeps that folder intact (keep_files) so a prod deploy never wipes open previews.
#
# Pages "Source" must be set to "Deploy from a branch" → gh-pages → / (root).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write   # peaceiris pushes the built site to the gh-pages branch

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Guard the anti-cheat determinism invariant before shipping.
      - name: Replay goldens
        run: npm test

      - name: Build bundle
        run: npm run build

      # Stage only the static site (HTML + built bundle + assets).
      - name: Assemble site
        run: |
          mkdir -p _site/dist
          cp index.html _site/
          cp dist/bundle.js _site/dist/
          cp -r assets _site/assets
          touch _site/.nojekyll

      - name: Publish to gh-pages root
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          keep_files: true   # don't delete pr-preview/ when deploying prod
