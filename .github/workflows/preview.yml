name: PR Preview

# Deploys each pull request to gh-pages/pr-preview/pr-<N>/ and comments the preview
# URL on the PR. Auto-removes the folder when the PR closes. Prod (main → root) is
# untouched; both share the gh-pages branch.
on:
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: write        # push the preview to gh-pages
  pull-requests: write   # comment the preview URL

concurrency:
  group: pages-preview-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  preview:
    runs-on: ubuntu-latest
    # Build only when the PR is open; on 'closed' the action just cleans up.
    steps:
      - uses: actions/checkout@v4

      - if: github.event.action != 'closed'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - if: github.event.action != 'closed'
        run: npm ci

      - if: github.event.action != 'closed'
        name: Replay goldens
        run: npm test

      - if: github.event.action != 'closed'
        name: Build bundle
        run: npm run build

      - if: github.event.action != 'closed'
        name: Assemble site
        run: |
          mkdir -p _site/dist
          cp index.html _site/
          cp dist/bundle.js _site/dist/
          cp -r assets _site/assets
          touch _site/.nojekyll

      - name: Deploy / clean up preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./_site
          # Previews live under pr-preview/pr-<N>/ on gh-pages (the action's default).
