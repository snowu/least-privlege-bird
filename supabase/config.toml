# Supabase project config. Link to the remote project with:
#   npx supabase link --project-ref yozllinwvvprtguinflm
project_id = "yozllinwvvprtguinflm"

[functions.submit-score]
# No user JWT — the game calls this with the publishable anon key. The function does
# its own auth (token-hash verify) and writes with the service role internally.
verify_jwt = false
