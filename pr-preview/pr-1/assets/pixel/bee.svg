<!-- viewBox = squared content bbox so the body fills the same footprint as every
     other model → the fixed circular hitbox stays visually fair. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="2.5 1.5 12 12" width="40" height="40" shape-rendering="crispEdges">
  <!-- wings -->
  <g fill="#cfeffd"><rect x="5" y="3" width="3" height="2"/><rect x="8" y="3" width="3" height="2"/></g>
  <!-- body (round, yellow/black stripes) -->
  <g fill="#ffd21e">
    <rect x="4" y="6" width="8" height="5"/>
    <rect x="5" y="5" width="6" height="1"/>
    <rect x="5" y="11" width="6" height="1"/>
  </g>
  <!-- stripes: full-height vertical bands (reach the rounded top+bottom rows so they
       read as banding, not eyes) -->
  <g fill="#1a1a1a">
    <rect x="6" y="5" width="2" height="7"/>
    <rect x="9" y="5" width="2" height="7"/>
  </g>
  <!-- head (right) + eye -->
  <rect x="12" y="7" width="2" height="3" fill="#1a1a1a"/>
  <rect x="13" y="7" width="1" height="1" fill="#fff"/>
  <!-- stinger (left) -->
  <rect x="3" y="8" width="1" height="1" fill="#1a1a1a"/>
  <!-- antenna -->
  <rect x="13" y="5" width="1" height="1" fill="#1a1a1a"/>
</svg>
