<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- Body -->
  <ellipse cx="20" cy="24" rx="10" ry="12" fill="#fdd835"/>
  <!-- Stripes -->
  <rect x="10" y="20" width="20" height="4" fill="#212121" rx="1"/>
  <rect x="10" y="27" width="20" height="4" fill="#212121" rx="1"/>
  <!-- Head -->
  <circle cx="20" cy="11" r="7" fill="#fdd835"/>
  <!-- Eyes -->
  <circle cx="17" cy="10" r="2" fill="#212121"/>
  <circle cx="23" cy="10" r="2" fill="#212121"/>
  <circle cx="17.8" cy="9.2" r="0.7" fill="#fff"/>
  <circle cx="23.8" cy="9.2" r="0.7" fill="#fff"/>
  <!-- Antennae -->
  <line x1="17" y1="4" x2="14" y2="1" stroke="#212121" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="14" cy="1" r="1.2" fill="#212121"/>
  <line x1="23" y1="4" x2="26" y2="1" stroke="#212121" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="26" cy="1" r="1.2" fill="#212121"/>
  <!-- Wings -->
  <ellipse cx="10" cy="18" rx="7" ry="4" fill="rgba(200,230,255,0.75)" transform="rotate(-15,10,18)"/>
  <ellipse cx="30" cy="18" rx="7" ry="4" fill="rgba(200,230,255,0.75)" transform="rotate(15,30,18)"/>
  <!-- Stinger -->
  <polygon points="16,36 24,36 20,40" fill="#f57f17"/>
</svg>
