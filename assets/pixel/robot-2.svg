<!-- Robot frame 2 (arm LOWERED). Same Bender-inspired side-profile body as robot.svg;
     only the bendy arm + pincer swing DOWN (the flap down-beat). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="1 1 14 14" width="40" height="40" shape-rendering="crispEdges">
  <!-- segmented antenna -->
  <rect x="7" y="1" width="1" height="2" fill="#9aa7b0"/>
  <rect x="7" y="2" width="1" height="1" fill="#6d7b85"/>
  <rect x="7" y="1" width="1" height="1" fill="#cfd8dc"/>
  <!-- head can -->
  <g fill="#90a4ae"><rect x="4" y="3" width="7" height="6"/></g>
  <rect x="4" y="3" width="7" height="1" fill="#cfd8dc"/>
  <rect x="4" y="3" width="1" height="6" fill="#b0bec5"/>
  <rect x="10" y="3" width="1" height="6" fill="#6d7b85"/>
  <!-- glass eye dome with two round eyes -->
  <g fill="#263238"><rect x="5" y="4" width="6" height="2"/></g>
  <rect x="7" y="4" width="1" height="1" fill="#fff"/>
  <rect x="9" y="4" width="1" height="1" fill="#fff"/>
  <rect x="7" y="5" width="1" height="1" fill="#00e5ff"/>
  <rect x="9" y="5" width="1" height="1" fill="#00e5ff"/>
  <!-- wide curved smiling grille -->
  <g fill="#37474f"><rect x="5" y="7" width="6" height="1"/></g>
  <rect x="5" y="7" width="1" height="1" fill="#263238"/>
  <rect x="10" y="7" width="1" height="1" fill="#263238"/>
  <rect x="6" y="7" width="1" height="1" fill="#b0bec5"/>
  <rect x="8" y="7" width="1" height="1" fill="#b0bec5"/>
  <!-- neck segment -->
  <rect x="6" y="9" width="3" height="1" fill="#607d8b"/>
  <!-- cylindrical chrome torso -->
  <g fill="#546e7a"><rect x="5" y="10" width="6" height="3"/></g>
  <rect x="5" y="10" width="1" height="3" fill="#6d7b85"/>
  <rect x="10" y="10" width="1" height="3" fill="#455a64"/>
  <rect x="7" y="10" width="1" height="3" fill="#455a64"/>
  <rect x="6" y="11" width="1" height="1" fill="#ff9800"/>
  <rect x="8" y="11" width="1" height="1" fill="#76ff03"/>
  <!-- leg poles + feet -->
  <g fill="#607d8b"><rect x="6" y="13" width="1" height="1"/><rect x="9" y="13" width="1" height="1"/></g>
  <g fill="#37474f"><rect x="5" y="14" width="2" height="1"/><rect x="9" y="14" width="2" height="1"/></g>
  <!-- bendy arm LOWERED: shoulder down-forward to the pincer -->
  <g fill="#607d8b">
    <rect x="11" y="10" width="2" height="1"/>
    <rect x="12" y="11" width="1" height="2"/>
    <rect x="12" y="12" width="2" height="1"/>
  </g>
  <!-- 2-prong PINCER claw, open, at the arm tip -->
  <g fill="#90a4ae">
    <rect x="14" y="12" width="1" height="2"/>
    <rect x="14" y="13" width="1" height="2"/>
  </g>
  <rect x="13" y="13" width="1" height="2" fill="#455a64"/>
</svg>
