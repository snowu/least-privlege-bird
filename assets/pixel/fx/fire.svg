<!-- Dragon fire-breath FX (pixel). Transparent background, drawn SEPARATELY in canvas to
     the right of the dragon's snout — NOT inside the avatar's sprite box — so it can be
     long and gently tapered without clipping. Origin/mouth at the LEFT (x≈0, narrow),
     flaring RIGHT. Chunky blocky pixels (crispEdges, hard colour steps), layered
     red (outer) → orange (mid) → yellow (hot core). Wide viewBox (24x12, aspect 0.5);
     the renderer draws it at width = s*scale, height = width*0.5. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 12" width="48" height="24" shape-rendering="crispEdges">
  <!-- outer red cone: narrow at the mouth (x0-2), gently flaring to full height at x23 -->
  <g fill="#e53935">
    <rect x="0"  y="5" width="2" height="2"/>
    <rect x="2"  y="5" width="2" height="3"/>
    <rect x="4"  y="4" width="3" height="4"/>
    <rect x="7"  y="4" width="3" height="5"/>
    <rect x="10" y="3" width="3" height="6"/>
    <rect x="13" y="2" width="3" height="8"/>
    <rect x="16" y="2" width="3" height="9"/>
    <rect x="19" y="1" width="3" height="10"/>
    <rect x="22" y="0" width="2" height="12"/>
  </g>
  <!-- orange mid layer -->
  <g fill="#fb8c00">
    <rect x="0"  y="5" width="2" height="1"/>
    <rect x="2"  y="5" width="3" height="2"/>
    <rect x="5"  y="5" width="3" height="2"/>
    <rect x="8"  y="4" width="3" height="3"/>
    <rect x="11" y="4" width="3" height="4"/>
    <rect x="14" y="3" width="3" height="5"/>
    <rect x="17" y="3" width="3" height="6"/>
    <rect x="20" y="2" width="3" height="8"/>
  </g>
  <!-- yellow hot core, strongest near the mouth, threading down the centre -->
  <g fill="#ffd54f">
    <rect x="0"  y="5" width="3" height="1"/>
    <rect x="3"  y="6" width="4" height="1"/>
    <rect x="7"  y="5" width="4" height="2"/>
    <rect x="11" y="5" width="4" height="2"/>
    <rect x="15" y="5" width="4" height="3"/>
    <rect x="19" y="4" width="4" height="4"/>
  </g>
</svg>
