<!-- Dragon FIRE frame: wings-down pose + a chunky, blocky (no-gradient) flame blasting
     FORWARD (rightward, the direction of travel) from the snout, fixed at face level so
     it tracks the head as the dragon moves. Triggered only on a random ~5-10 flap
     cadence and held ~1s. The whole dragon is shifted left of frame 2 to leave room for
     a long, gently-flaring flame cone inside the viewBox. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="1 1 14 14" width="40" height="40" shape-rendering="crispEdges">
  <!-- tail (far left, compact) -->
  <g fill="#e53935">
    <rect x="2" y="9" width="2" height="1"/>
    <rect x="1" y="10" width="2" height="1"/>
  </g>
  <rect x="1" y="9" width="1" height="1" fill="#ffd54f"/>
  <!-- BIG wing swept down -->
  <g fill="#c2185b">
    <rect x="2" y="9" width="2" height="2"/>
    <rect x="2" y="11" width="2" height="2"/>
    <rect x="1" y="13" width="2" height="1"/>
    <rect x="4" y="10" width="2" height="3"/>
    <rect x="6" y="10" width="2" height="4"/>
  </g>
  <g fill="#7a0f3a"><rect x="2" y="9" width="1" height="5"/><rect x="5" y="10" width="1" height="3"/><rect x="7" y="10" width="1" height="4"/></g>
  <g fill="#ff7043"><rect x="1" y="13" width="1" height="1"/><rect x="6" y="13" width="1" height="1"/></g>
  <!-- body -->
  <g fill="#e53935">
    <rect x="1" y="8" width="2" height="2"/>
    <rect x="3" y="7" width="3" height="2"/>
    <rect x="5" y="6" width="3" height="2"/>
  </g>
  <g fill="#fb8c00"><rect x="2" y="9" width="2" height="1"/><rect x="4" y="8" width="3" height="1"/></g>
  <g fill="#c2185b"><rect x="4" y="6" width="1" height="1"/><rect x="6" y="5" width="1" height="1"/></g>
  <!-- back leg -->
  <g fill="#c2185b"><rect x="1" y="9" width="2" height="2"/></g>
  <rect x="1" y="11" width="1" height="1" fill="#7a0f3a"/>
  <!-- front leg -->
  <g fill="#c2185b"><rect x="6" y="8" width="1" height="1"/></g>
  <!-- horns -->
  <g fill="#ffd54f"><rect x="6" y="4" width="1" height="1"/><rect x="8" y="4" width="1" height="1"/></g>
  <!-- head, mouth OPEN -->
  <g fill="#e53935"><rect x="6" y="5" width="3" height="3"/></g>
  <rect x="8" y="7" width="1" height="1" fill="#b71c1c"/>
  <!-- eye -->
  <rect x="7" y="5" width="1" height="1" fill="#fff"/>
  <rect x="8" y="5" width="1" height="1" fill="#1a1a1a"/>
  <!-- CHUNKY FORWARD FLAME CONE: narrow at the snout, flaring GENTLY wider over 6
       columns to the right edge. Soft slope (1px → 9px tall over x9..14). Layered
       red (outer) → orange (mid) → yellow (hot core near the mouth). -->
  <!-- outer red cone -->
  <g fill="#e53935">
    <rect x="9"  y="6" width="1" height="2"/>
    <rect x="10" y="6" width="1" height="3"/>
    <rect x="11" y="5" width="1" height="4"/>
    <rect x="12" y="4" width="1" height="6"/>
    <rect x="13" y="4" width="1" height="7"/>
    <rect x="14" y="3" width="1" height="9"/>
  </g>
  <!-- orange mid cone -->
  <g fill="#fb8c00">
    <rect x="9"  y="6" width="1" height="1"/>
    <rect x="10" y="6" width="1" height="2"/>
    <rect x="11" y="6" width="1" height="2"/>
    <rect x="12" y="5" width="1" height="4"/>
    <rect x="13" y="5" width="1" height="5"/>
    <rect x="14" y="4" width="1" height="7"/>
  </g>
  <!-- yellow hot core -->
  <g fill="#ffd54f">
    <rect x="9"  y="6" width="1" height="1"/>
    <rect x="10" y="6" width="1" height="1"/>
    <rect x="11" y="6" width="1" height="1"/>
    <rect x="12" y="6" width="1" height="2"/>
    <rect x="13" y="6" width="1" height="3"/>
    <rect x="14" y="6" width="1" height="3"/>
  </g>
</svg>
