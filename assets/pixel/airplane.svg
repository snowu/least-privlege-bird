<!-- viewBox = squared content bbox so the body fills the same footprint as every
     other model → the fixed circular hitbox stays visually fair. -->
<!-- Toy prop-plane, nose pointing right (direction of travel). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="1 1 13 13" width="40" height="40" shape-rendering="crispEdges">
  <!-- tail fin (left) -->
  <g fill="#d13212">
    <rect x="2" y="3" width="1" height="3"/>
    <rect x="3" y="4" width="1" height="2"/>
  </g>
  <!-- fuselage -->
  <g fill="#e0e6ed">
    <rect x="3" y="6" width="9" height="3"/>
    <rect x="4" y="5" width="6" height="1"/>
    <rect x="4" y="9" width="6" height="1"/>
  </g>
  <!-- fuselage shading -->
  <g fill="#b8c2cf">
    <rect x="3" y="8" width="9" height="1"/>
  </g>
  <!-- nose cone (right) -->
  <g fill="#9aa6b2">
    <rect x="12" y="6" width="1" height="3"/>
    <rect x="13" y="7" width="1" height="1"/>
  </g>
  <!-- spinning prop (at nose) -->
  <g fill="#37474f">
    <rect x="13" y="5" width="1" height="5"/>
  </g>
  <!-- cockpit window -->
  <rect x="9" y="6" width="2" height="2" fill="#00e5ff"/>
  <rect x="9" y="6" width="1" height="1" fill="#aef7ff"/>
  <!-- wing (jutting down, perspective) -->
  <g fill="#c2cad6">
    <rect x="5" y="9" width="5" height="1"/>
    <rect x="6" y="10" width="4" height="1"/>
    <rect x="7" y="11" width="2" height="1"/>
  </g>
  <!-- red cheat-line down the side -->
  <rect x="3" y="7" width="9" height="1" fill="#d13212"/>
</svg>
