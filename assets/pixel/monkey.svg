<!-- viewBox = squared content bbox so the body fills the same footprint as every
     other model → the fixed circular hitbox stays visually fair. -->
<!-- "Barrel-flinging gorilla" — DK callback: side-profile facing RIGHT, leaning
     forward, shoulder hump, heavy brow, knuckle planted on the ground, tiny red
     tie. Frame 2 (monkey-2) pulls that arm up into a paddle stroke. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="1 0 14 14" width="40" height="40" shape-rendering="crispEdges">
  <!-- cranium + ear -->
  <rect x="10" y="2" width="3" height="2" fill="#4a2e1a"/>
  <rect x="10" y="2" width="1" height="1" fill="#2b1a0e"/>
  <!-- heavy brow ridge -->
  <rect x="10" y="4" width="4" height="1" fill="#2b1a0e"/>
  <!-- face -->
  <rect x="10" y="5" width="3" height="2" fill="#4a2e1a"/>
  <!-- muzzle (tan, jutting forward) -->
  <rect x="13" y="5" width="2" height="2" fill="#c79a6e"/>
  <!-- eye -->
  <rect x="11" y="5" width="1" height="1" fill="#e8d8b8"/>
  <!-- nostril -->
  <rect x="14" y="6" width="1" height="1" fill="#2b1a0e"/>
  <!-- shoulder hump -->
  <rect x="7" y="4" width="3" height="3" fill="#4a2e1a"/>
  <!-- back sloping down to the rump -->
  <rect x="5" y="7" width="3" height="2" fill="#3a2414"/>
  <rect x="4" y="8" width="2" height="2" fill="#2b1a0e"/>
  <!-- chest / belly -->
  <rect x="8" y="7" width="3" height="3" fill="#c79a6e"/>
  <!-- DK-style tie -->
  <rect x="8" y="8" width="2" height="2" fill="#d13212"/>
  <!-- knuckle arm planted on the ground -->
  <g fill="#3a2414">
    <rect x="10" y="7" width="1" height="2"/>
    <rect x="10" y="9" width="1" height="3"/>
  </g>
  <rect x="9" y="12" width="2" height="1" fill="#2b1a0e"/>
  <!-- hind leg, bent beneath -->
  <rect x="6" y="9" width="2" height="2" fill="#3a2414"/>
  <rect x="6" y="11" width="2" height="2" fill="#2b1a0e"/>
</svg>
