<!-- viewBox = squared content bbox so body fills the same footprint as other models. -->
<!-- Dragon frame 1 (wings UP). Elongated serpentine body across the vertical hitbox:
     head front-RIGHT raised high, neck down to a long curved tail flicking up bottom-
     left. Wing raised to the top edge. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="1 1 14 14" width="40" height="40" shape-rendering="crispEdges">
  <!-- long curved tail: low-left, flicks up at the tip -->
  <g fill="#e53935">
    <rect x="6" y="9" width="2" height="1"/>
    <rect x="4" y="10" width="2" height="1"/>
    <rect x="3" y="11" width="2" height="1"/>
    <rect x="2" y="10" width="1" height="2"/>
  </g>
  <rect x="1" y="9" width="1" height="2" fill="#ffd54f"/>
  <rect x="2" y="9" width="1" height="1" fill="#ffd54f"/>
  <!-- BIG wing raised toward TOP edge -->
  <g fill="#c2185b">
    <rect x="7" y="6" width="2" height="2"/>
    <rect x="7" y="4" width="2" height="2"/>
    <rect x="6" y="2" width="2" height="2"/>
    <rect x="9" y="3" width="2" height="3"/>
    <rect x="11" y="2" width="2" height="4"/>
  </g>
  <g fill="#7a0f3a"><rect x="7" y="2" width="1" height="6"/><rect x="10" y="3" width="1" height="3"/><rect x="12" y="2" width="1" height="4"/></g>
  <g fill="#ff7043"><rect x="6" y="2" width="1" height="1"/><rect x="11" y="2" width="1" height="1"/></g>
  <!-- elongated body: low-left rising to head high-right -->
  <g fill="#e53935">
    <rect x="6" y="8" width="2" height="2"/>
    <rect x="8" y="7" width="3" height="2"/>
    <rect x="10" y="6" width="3" height="2"/>
  </g>
  <!-- belly highlight -->
  <g fill="#fb8c00"><rect x="7" y="9" width="2" height="1"/><rect x="9" y="8" width="3" height="1"/></g>
  <!-- dorsal scales -->
  <g fill="#c2185b"><rect x="9" y="6" width="1" height="1"/><rect x="11" y="5" width="1" height="1"/></g>
  <!-- prominent back leg (left, thick) -->
  <g fill="#c2185b"><rect x="6" y="10" width="2" height="3"/><rect x="5" y="12" width="3" height="1"/></g>
  <rect x="5" y="13" width="1" height="1" fill="#7a0f3a"/>
  <rect x="7" y="13" width="1" height="1" fill="#7a0f3a"/>
  <!-- front leg (right, smaller) -->
  <g fill="#c2185b"><rect x="11" y="8" width="1" height="2"/></g>
  <!-- horns -->
  <g fill="#ffd54f"><rect x="11" y="4" width="1" height="1"/><rect x="13" y="4" width="1" height="1"/></g>
  <!-- head front-right, raised -->
  <g fill="#e53935"><rect x="11" y="5" width="3" height="3"/></g>
  <rect x="14" y="6" width="1" height="2" fill="#fb8c00"/>
  <!-- eye -->
  <rect x="12" y="5" width="1" height="1" fill="#fff"/>
  <rect x="13" y="5" width="1" height="1" fill="#1a1a1a"/>
</svg>
