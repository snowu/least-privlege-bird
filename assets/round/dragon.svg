<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- RED dragon frame 1: facing RIGHT. BIG angular bat-wings RAISED high above the
       body — a clearly different silhouette from frame 2 (wings down). -->
  <!-- Left wing raised: big notched membrane -->
  <path d="M17 18 L14 2 L8 9 L9 11 L4 9 L6 14 L11 14 Z" fill="#b71c1c"/>
  <!-- Right wing raised -->
  <path d="M22 18 L26 3 L31 10 L30 12 L35 11 L32 15 L27 15 Z" fill="#b71c1c"/>
  <!-- wing-bone struts -->
  <g stroke="#7f0000" stroke-width="1" fill="none" stroke-linecap="round">
    <path d="M16 18 L14 3"/>
    <path d="M16 18 L8 9"/>
    <path d="M23 18 L26 4"/>
    <path d="M23 18 L31 10"/>
  </g>
  <!-- bright top edge -->
  <path d="M14 3 L16 18" stroke="#ff7676" stroke-width="1" fill="none"/>
  <path d="M26 4 L23 18" stroke="#ff7676" stroke-width="1" fill="none"/>
  <!-- arrow tail trailing far left -->
  <path d="M13 24 Q5 24 2 28 L7 26 Q10 25 14 25 Z" fill="#d32f2f"/>
  <polygon points="1,28 5,25 5,31" fill="#ffd54f"/>
  <!-- chunky body, rising to head on the right -->
  <path d="M9 26 Q20 28 29 21 Q33 18 35 21 Q31 27 21 27 Q14 28 9 26 Z" fill="#d32f2f"/>
  <!-- belly highlight -->
  <path d="M12 26 Q21 27 28 22 Q22 27 14 27 Z" fill="#ff7043"/>
  <!-- head (front-right) -->
  <ellipse cx="31" cy="20" rx="5.5" ry="4" fill="#d32f2f"/>
  <!-- snout -->
  <ellipse cx="36" cy="21" rx="2.8" ry="1.9" fill="#b71c1c"/>
  <circle cx="38" cy="21" r="0.8" fill="#7f0000"/>
  <!-- horns -->
  <polygon points="29,17 28,13 31,16" fill="#ffd54f"/>
  <polygon points="32,17 33,13 34,17" fill="#ffd54f"/>
  <!-- dorsal spikes -->
  <polygon points="24,20 23,17 26,20" fill="#ffd54f"/>
  <polygon points="18,22 17,19 20,22" fill="#ffd54f"/>
  <!-- eye -->
  <circle cx="31" cy="19" r="1.7" fill="#fff"/>
  <circle cx="31.7" cy="19.2" r="0.9" fill="#ffc400"/>
</svg>
