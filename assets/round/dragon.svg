<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- Dragon frame 1 (wings UP). Elongated serpentine body filling the vertical hitbox:
       head front-RIGHT raised high, neck sweeps down-left, long curved tail flicking up
       at the far-left tip. Wing raised toward the top edge. -->
  <!-- long curved tail: from mid-body, dips low-left, flicks up at the tip -->
  <path d="M16 22 Q11 30 7 28 Q3 26 2 30 Q5 29 7 32 Q12 34 18 26 Z" fill="#e53935"/>
  <polygon points="1,33 6,30 5,35" fill="#ffd54f"/>
  <!-- BIG wing raised to TOP edge -->
  <path d="M17 17 L14 2 L21 7 L20 10 L27 5 L25 12 L31 10 L23 18 Z" fill="#c2185b"/>
  <g stroke="#7a0f3a" stroke-width="1.2" fill="none" stroke-linecap="round">
    <path d="M18 17 L15 3"/><path d="M19 17 L21 7"/><path d="M20 17 L26 7"/>
  </g>
  <path d="M15 3 L18 17" stroke="#ff7043" stroke-width="1" fill="none"/>
  <!-- elongated serpentine body: low-left up to the head high-right -->
  <path d="M14 27 Q12 22 16 19 Q22 15 28 13 Q33 12 34 16 Q30 18 25 20 Q19 23 18 28 Z" fill="#e53935"/>
  <!-- belly highlight -->
  <path d="M16 25 Q20 20 27 17 Q22 22 18 27 Z" fill="#fb8c00"/>
  <!-- dorsal scales along the spine -->
  <polygon points="20,18 19,15 22,17" fill="#c2185b"/>
  <polygon points="25,16 24,13 27,15" fill="#c2185b"/>
  <!-- prominent back leg (left, thick thigh + clawed foot) -->
  <path d="M17 26 Q14 30 16 34 L14 36 L19 35 L20 31 Q21 28 20 26 Z" fill="#c2185b"/>
  <path d="M14 36 L16 36 M16 35 L18 36" stroke="#7a0f3a" stroke-width="0.9"/>
  <!-- front leg (right, smaller) -->
  <path d="M27 21 L28 26 L30 22 Z" fill="#c2185b"/>
  <!-- horns -->
  <polygon points="33,11 32,7 35,10" fill="#ffd54f"/>
  <polygon points="36,11 37,7 38,11" fill="#ffd54f"/>
  <!-- head front-right, raised high, snout pointing right -->
  <ellipse cx="34" cy="15" rx="5" ry="4" fill="#e53935"/>
  <ellipse cx="39" cy="16" rx="2.4" ry="1.7" fill="#fb8c00"/>
  <circle cx="40" cy="16" r="0.8" fill="#7a0f3a"/>
  <!-- eye -->
  <circle cx="34" cy="14" r="1.6" fill="#fff"/>
  <circle cx="34.6" cy="14.2" r="0.85" fill="#1a1a1a"/>
</svg>
