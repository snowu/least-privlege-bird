<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- Dragon frame 2 (wings DOWN + FIRE BREATH). Same elongated pose as dragon.svg;
       shown for the flap window, so the fire reads as "spat on jump". Wing swept down. -->
  <!-- long curved tail -->
  <path d="M16 22 Q11 30 7 28 Q3 26 2 30 Q5 29 7 32 Q12 34 18 26 Z" fill="#e53935"/>
  <polygon points="1,33 6,30 5,35" fill="#ffd54f"/>
  <!-- BIG wing swept DOWN toward bottom edge -->
  <path d="M17 21 L14 36 L21 31 L20 28 L27 34 L25 27 L31 29 L23 20 Z" fill="#c2185b"/>
  <g stroke="#7a0f3a" stroke-width="1.2" fill="none" stroke-linecap="round">
    <path d="M18 21 L15 35"/><path d="M19 21 L21 31"/><path d="M20 21 L26 32"/>
  </g>
  <path d="M15 35 L18 21" stroke="#ff7043" stroke-width="1" fill="none"/>
  <!-- elongated serpentine body -->
  <path d="M14 27 Q12 22 16 19 Q22 15 28 13 Q33 12 34 16 Q30 18 25 20 Q19 23 18 28 Z" fill="#e53935"/>
  <path d="M16 25 Q20 20 27 17 Q22 22 18 27 Z" fill="#fb8c00"/>
  <polygon points="20,18 19,15 22,17" fill="#c2185b"/>
  <polygon points="25,16 24,13 27,15" fill="#c2185b"/>
  <!-- back leg -->
  <path d="M17 26 Q14 30 16 34 L14 36 L19 35 L20 31 Q21 28 20 26 Z" fill="#c2185b"/>
  <path d="M14 36 L16 36 M16 35 L18 36" stroke="#7a0f3a" stroke-width="0.9"/>
  <!-- front leg -->
  <path d="M27 21 L28 26 L30 22 Z" fill="#c2185b"/>
  <!-- horns -->
  <polygon points="33,11 32,7 35,10" fill="#ffd54f"/>
  <polygon points="36,11 37,7 38,11" fill="#ffd54f"/>
  <!-- head (pulled back a touch to leave room for the flame), mouth OPEN -->
  <ellipse cx="31" cy="15" rx="5" ry="4" fill="#e53935"/>
  <!-- open lower jaw -->
  <path d="M34 16 L37 19 L31 18 Z" fill="#b71c1c"/>
  <!-- eye -->
  <circle cx="31" cy="14" r="1.6" fill="#fff"/>
  <circle cx="31.6" cy="14.2" r="0.85" fill="#1a1a1a"/>
  <!-- FIRE BREATH jet from the mouth, front-right (kept inside the viewBox) -->
  <path d="M34 17 Q40 12 40 18 Q40 22 39 26 Q36 23 34 26 Q35 20 33 18 Z" fill="#e53935"/>
  <path d="M34 17 Q39 13 39 18 Q39 21 38 24 Q36 22 34 24 Q35 20 33 18 Z" fill="#fb8c00"/>
  <path d="M34 17 Q38 15 38 19 Q38 21 37 23 Q36 21 35 22 Q35 19 34 18 Z" fill="#ffd54f"/>
</svg>
