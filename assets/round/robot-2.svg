<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- Robot frame 2 (arm LOWERED). Same Bender-inspired body as robot.svg; the bendy arm
       + pincer swing DOWN (the flap down-beat). -->
  <!-- segmented antenna -->
  <line x1="18" y1="3" x2="18" y2="9" stroke="#9aa7b0" stroke-width="2" stroke-linecap="round"/>
  <circle cx="18" cy="3" r="1.8" fill="#cfd8dc"/>
  <!-- head can -->
  <rect x="8" y="9" width="22" height="14" rx="4" fill="#90a4ae"/>
  <rect x="8" y="9" width="22" height="3" rx="2" fill="#cfd8dc"/>
  <!-- glass eye visor with two round eyes -->
  <rect x="11" y="13" width="16" height="6" rx="3" fill="#263238"/>
  <circle cx="16" cy="16" r="2" fill="#fff"/>
  <circle cx="22" cy="16" r="2" fill="#fff"/>
  <circle cx="16.4" cy="16.2" r="1.1" fill="#00e5ff"/>
  <circle cx="22.4" cy="16.2" r="1.1" fill="#00e5ff"/>
  <!-- curved smiling grille -->
  <path d="M11 21 Q19 25 27 21" stroke="#37474f" stroke-width="3" fill="none" stroke-linecap="round"/>
  <line x1="16" y1="21.5" x2="16" y2="23.5" stroke="#263238" stroke-width="1.4"/>
  <line x1="19" y1="22.5" x2="19" y2="24.5" stroke="#263238" stroke-width="1.4"/>
  <line x1="22" y1="21.5" x2="22" y2="23.5" stroke="#263238" stroke-width="1.4"/>
  <!-- chrome can torso -->
  <rect x="11" y="24" width="18" height="12" rx="6" fill="#546e7a"/>
  <rect x="11" y="24" width="4" height="12" rx="2" fill="#6d7b85"/>
  <line x1="20" y1="24" x2="20" y2="36" stroke="#455a64" stroke-width="1.6"/>
  <circle cx="17" cy="30" r="1.4" fill="#ff9800"/>
  <circle cx="23" cy="30" r="1.4" fill="#76ff03"/>
  <!-- leg poles + feet -->
  <line x1="16" y1="36" x2="16" y2="39" stroke="#607d8b" stroke-width="2.4"/>
  <line x1="23" y1="36" x2="23" y2="39" stroke="#607d8b" stroke-width="2.4"/>
  <rect x="13" y="38" width="6" height="2" rx="1" fill="#37474f"/>
  <rect x="20" y="38" width="6" height="2" rx="1" fill="#37474f"/>
  <!-- bendy arm LOWERED to the pincer -->
  <path d="M29 28 L34 31 L37 36" stroke="#607d8b" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <g stroke="#90a4ae" stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M37 36 L39 32"/>
    <path d="M37 36 L40 38"/>
  </g>
</svg>
