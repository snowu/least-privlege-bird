<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- "Total meltdown penguin": lopsided trembling body, flippers flailing in
       opposite directions, spiky bedhead going every way, multiple sweat beads,
       eye bags, bloodshot mismatched bug-eyes, screaming beak + tongue. This bird
       is moments from a complete breakdown. Nothing about it reads clean/Tux. -->
  <!-- Body (black, lopsided, leaning hard right) -->
  <path d="M8 24 q-2 -17 12 -17 q13 0 11 17 q-1 11 -11 11 q-10 0 -12 -11 z" fill="#23233a"/>
  <!-- White belly (off-centre, ragged edge) -->
  <path d="M13 25 q-1 -12 7 -12 q8 0 6 12 q-1 9 -6 9 q-6 0 -7 -9 z" fill="#f2f4f8"/>
  <!-- spiky frazzled bedhead (five tufts, chaotic) -->
  <g fill="#1a1a2e">
    <path d="M18 7 q-2 -6 1 -6 q1 3 0 6 z"/>
    <path d="M21 6 q3 -5 6 -2 q-3 2 -6 4 z"/>
    <path d="M16 8 q-5 -3 -7 0 q4 2 7 1 z"/>
    <path d="M23 8 q5 -2 7 1 q-4 2 -7 1 z"/>
    <path d="M20 6 q0 -5 2 -5 q0 3 -1 5 z"/>
  </g>
  <!-- Left flipper flung straight up (panic wave) -->
  <path d="M9 15 q-7 -2 -7 -6 q5 -1 8 3 z" fill="#1a1a2e"/>
  <!-- Right flipper flailing down/out -->
  <path d="M31 18 q7 4 5 12 q-5 -2 -6 -9 z" fill="#1a1a2e"/>
  <!-- dark eye bags (exhausted) -->
  <path d="M12 18 q3 2 7 1" stroke="#3a3a5a" stroke-width="1.2" fill="none"/>
  <path d="M21 18 q3 1 6 0" stroke="#3a3a5a" stroke-width="1.2" fill="none"/>
  <!-- Eye whites (uneven, bulging — left huge) -->
  <circle cx="15" cy="14" r="5" fill="#fff"/>
  <circle cx="24.5" cy="14.5" r="3.2" fill="#fff"/>
  <!-- bloodshot streaks -->
  <path d="M13 12 l-2 -1 M13 16 l-2 1" stroke="#e05050" stroke-width="0.5"/>
  <!-- Tiny pinprick pupils pulled inward (full panic) -->
  <circle cx="17.5" cy="13" r="1.4" fill="#1a1a1a"/>
  <circle cx="23" cy="13.8" r="1.1" fill="#1a1a1a"/>
  <!-- frantic angled brows -->
  <path d="M10 9 q4 -3 8 0" stroke="#1a1a2e" stroke-width="1.2" fill="none"/>
  <path d="M22 11 q3 -2 7 1" stroke="#1a1a2e" stroke-width="1.2" fill="none"/>
  <!-- Screaming open beak (wide) -->
  <polygon points="15,17 25,17 20,26" fill="#f5a623"/>
  <polygon points="16,18.5 24,18.5 20,25" fill="#c0392b"/>
  <!-- little tongue mid-scream -->
  <ellipse cx="20" cy="21" rx="1.4" ry="2.2" fill="#e8748a"/>
  <!-- Sweat beads (three, flying off) -->
  <path d="M31 10 q1.6 1.6 0 3.2 q-1.6 -1.6 0 -3.2 z" fill="#7ec8f2"/>
  <path d="M33 16 q1.2 1.2 0 2.4 q-1.2 -1.2 0 -2.4 z" fill="#7ec8f2"/>
  <path d="M7 11 q1.3 1.3 0 2.6 q-1.3 -1.3 0 -2.6 z" fill="#7ec8f2"/>
  <!-- Orange feet (splayed wide, off-balance) -->
  <ellipse cx="13" cy="37.5" rx="4.5" ry="2" fill="#f5a623" transform="rotate(-18 13 37)"/>
  <ellipse cx="27" cy="37.5" rx="4.2" ry="2" fill="#f5a623" transform="rotate(14 27 37)"/>
</svg>
