<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- Horse frame 1 (gallop EXTENDED: front legs forward, hind legs back). Side-profile
       facing RIGHT: rounded barrel, arched neck, blocky head with ear + muzzle, stubby
       tail. Flowing mane + tail streamers are drawn programmatically in drawPlayer. -->
  <!-- tail base -->
  <path d="M11 19 Q6 21 6 27" stroke="#5a3823" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- barrel body -->
  <ellipse cx="19" cy="22" rx="11" ry="7" fill="#a86a42"/>
  <ellipse cx="19" cy="20" rx="10" ry="4.5" fill="#bd7d52"/>
  <!-- arched neck -->
  <path d="M27 22 Q30 13 33 11" stroke="#a86a42" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- head + muzzle -->
  <rect x="30" y="7" width="9" height="8" rx="3" fill="#a86a42" transform="rotate(12 34 11)"/>
  <!-- ear -->
  <path d="M31 7 L33 4 L34 8 Z" fill="#8d5a3b"/>
  <!-- eye + nostril -->
  <circle cx="35" cy="10" r="1.3" fill="#1a1008"/>
  <circle cx="38.5" cy="13.5" r="1" fill="#1a1008"/>
  <!-- mane base along the crest -->
  <path d="M28 16 Q30 11 33 9" stroke="#5a3823" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- FRONT legs reaching forward -->
  <line x1="26" y1="27" x2="31" y2="34" stroke="#8d5a3b" stroke-width="3.4" stroke-linecap="round"/>
  <line x1="23" y1="27" x2="25" y2="34" stroke="#8d5a3b" stroke-width="3.4" stroke-linecap="round"/>
  <!-- HIND legs kicked back -->
  <line x1="14" y1="27" x2="9" y2="33" stroke="#8d5a3b" stroke-width="3.4" stroke-linecap="round"/>
  <line x1="16" y1="27" x2="14" y2="33" stroke="#8d5a3b" stroke-width="3.4" stroke-linecap="round"/>
  <!-- hooves -->
  <g fill="#2b1a0e">
    <circle cx="31" cy="34" r="1.6"/><circle cx="25" cy="34" r="1.6"/>
    <circle cx="9" cy="33" r="1.6"/><circle cx="14" cy="33" r="1.6"/>
  </g>
</svg>
