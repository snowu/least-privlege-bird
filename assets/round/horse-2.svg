<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- Horse frame 2 (gallop GATHERED: legs tucked under, suspension moment). Same body;
       only legs change. Shown for a beat after flap → reads as a running cycle. -->
  <!-- tail base -->
  <path d="M11 19 Q6 21 6 27" stroke="#5a3823" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- barrel body -->
  <ellipse cx="19" cy="22" rx="11" ry="7" fill="#a86a42"/>
  <ellipse cx="19" cy="20" rx="10" ry="4.5" fill="#bd7d52"/>
  <!-- arched neck -->
  <path d="M27 22 Q30 13 33 11" stroke="#a86a42" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- head + muzzle -->
  <rect x="30" y="7" width="9" height="8" rx="3" fill="#a86a42" transform="rotate(12 34 11)"/>
  <!-- ear -->
  <path d="M31 7 L33 4 L34 8 Z" fill="#8d5a3b"/>
  <!-- eye + nostril -->
  <circle cx="35" cy="10" r="1.3" fill="#1a1008"/>
  <circle cx="38.5" cy="13.5" r="1" fill="#1a1008"/>
  <!-- mane base along the crest -->
  <path d="M28 16 Q30 11 33 9" stroke="#5a3823" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- ALL legs gathered/tucked under the barrel, bent inward -->
  <line x1="25" y1="27" x2="27" y2="32" stroke="#8d5a3b" stroke-width="3.4" stroke-linecap="round"/>
  <line x1="22" y1="27" x2="23" y2="32" stroke="#8d5a3b" stroke-width="3.4" stroke-linecap="round"/>
  <line x1="16" y1="27" x2="14" y2="32" stroke="#8d5a3b" stroke-width="3.4" stroke-linecap="round"/>
  <line x1="14" y1="27" x2="12" y2="32" stroke="#8d5a3b" stroke-width="3.4" stroke-linecap="round"/>
  <!-- hooves -->
  <g fill="#2b1a0e">
    <circle cx="27" cy="32" r="1.6"/><circle cx="23" cy="32" r="1.6"/>
    <circle cx="14" cy="32" r="1.6"/><circle cx="12" cy="32" r="1.6"/>
  </g>
</svg>
