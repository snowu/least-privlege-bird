<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- Antenna -->
  <line x1="20" y1="2" x2="20" y2="7" stroke="#78909c" stroke-width="2" stroke-linecap="round"/>
  <circle cx="20" cy="2" r="2" fill="#ef5350"/>
  <!-- Head -->
  <rect x="9" y="7" width="22" height="16" rx="4" fill="#78909c"/>
  <!-- Eyes (LED style) -->
  <rect x="12" y="11" width="6" height="5" rx="1.5" fill="#00e5ff"/>
  <rect x="22" y="11" width="6" height="5" rx="1.5" fill="#00e5ff"/>
  <!-- Mouth display -->
  <rect x="13" y="18" width="14" height="3" rx="1" fill="#212121"/>
  <rect x="14" y="18.5" width="3" height="2" rx="0.5" fill="#76ff03"/>
  <rect x="18.5" y="18.5" width="3" height="2" rx="0.5" fill="#76ff03"/>
  <!-- Body -->
  <rect x="11" y="24" width="18" height="12" rx="3" fill="#546e7a"/>
  <!-- Chest panel -->
  <rect x="15" y="27" width="10" height="6" rx="1" fill="#37474f"/>
  <circle cx="18" cy="30" r="1.5" fill="#ff9800"/>
  <circle cx="22" cy="30" r="1.5" fill="#00e5ff"/>
  <!-- Arms -->
  <rect x="4" y="24" width="6" height="10" rx="3" fill="#546e7a"/>
  <rect x="30" y="24" width="6" height="10" rx="3" fill="#546e7a"/>
  <!-- Legs -->
  <rect x="13" y="36" width="6" height="4" rx="2" fill="#546e7a"/>
  <rect x="21" y="36" width="6" height="4" rx="2" fill="#546e7a"/>
</svg>
