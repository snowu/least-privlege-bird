<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- Body: rump + shoulder hump, leaning forward toward the head -->
  <circle cx="14" cy="27" r="8" fill="#4a2e1a"/>
  <circle cx="26" cy="22" r="9" fill="#4a2e1a"/>
  <!-- Belly patch -->
  <ellipse cx="23" cy="26" rx="6" ry="6" fill="#c79a6e"/>
  <!-- DK-style tie -->
  <polygon points="21,23 26,23 23.5,30" fill="#d13212"/>
  <!-- Ear -->
  <circle cx="26" cy="9" r="2.6" fill="#2b1a0e"/>
  <!-- Head, jutting forward -->
  <circle cx="31" cy="15" r="7" fill="#4a2e1a"/>
  <!-- Heavy brow ridge -->
  <path d="M26 14 q5 -3 10 -1" stroke="#2b1a0e" stroke-width="2.6" fill="none" stroke-linecap="round"/>
  <!-- Muzzle -->
  <ellipse cx="36" cy="18" rx="3.5" ry="3" fill="#c79a6e"/>
  <!-- Eye -->
  <circle cx="29" cy="15" r="1.3" fill="#e8d8b8"/>
  <!-- Nostril -->
  <circle cx="37.7" cy="19" r="0.8" fill="#2b1a0e"/>
  <!-- Knuckle arm, planted on the ground -->
  <path d="M25 28 q1 6 -1 10" stroke="#3a2414" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <circle cx="23.5" cy="38" r="3" fill="#2b1a0e"/>
  <!-- Hind leg, bent beneath -->
  <path d="M12 33 q-3 3 -1 6" stroke="#3a2414" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <ellipse cx="10.5" cy="38.5" rx="3" ry="1.8" fill="#2b1a0e"/>
</svg>
