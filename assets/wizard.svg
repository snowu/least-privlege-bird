<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- Hat cone -->
  <polygon points="20,2 8,30 32,30" fill="#4a148c"/>
  <!-- Hat brim -->
  <ellipse cx="20" cy="30" rx="14" ry="4" fill="#6a1b9a"/>
  <!-- Stars on hat -->
  <polygon points="14,12 15.2,15.5 19,15.5 16.2,17.5 17.2,21 14,19 10.8,21 11.8,17.5 9,15.5 12.8,15.5" fill="#ffd600" transform="scale(0.5) translate(13,4)"/>
  <circle cx="22" cy="14" r="1.5" fill="#ffd600"/>
  <circle cx="17" cy="20" r="1" fill="#ce93d8"/>
  <!-- Face below brim (the wizard's face) -->
  <circle cx="20" cy="35" r="5" fill="#ffe0b2"/>
  <!-- Eyes -->
  <circle cx="18" cy="34" r="1.2" fill="#4a148c"/>
  <circle cx="22" cy="34" r="1.2" fill="#4a148c"/>
  <!-- Smile -->
  <path d="M17.5 37 Q20 39 22.5 37" stroke="#795548" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Beard -->
