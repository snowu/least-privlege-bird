<!-- Round/vector counterpart to assets/logo.svg: the disheveled "derpy panic bird"
     in the 🐦 perch pose — facing LEFT, cross-eyed, gaping beak, alarmed tuft.
     Swapped in beside the title when round graphics are active. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="64" height="64">
  <!-- alarmed feather tuft -->
  <path d="M19 5 q1 -5 4 -4 q-1 3 -3 5 z" fill="#3b88c3"/>
  <!-- tail (up-right) -->
  <polygon points="30,9 38,6 33,13 30,15" fill="#3b88c3"/>
  <polygon points="30,10 35,8 32,14" fill="#55acee"/>
  <!-- body -->
  <ellipse cx="19" cy="20" rx="14" ry="11" fill="#55acee"/>
  <!-- belly highlight -->
  <ellipse cx="18" cy="24" rx="9" ry="6" fill="#cce8fb"/>
  <!-- folded wing -->
  <path d="M16 16 q10 -1 14 3 q-7 6 -15 4 q-3 -4 1 -7 z" fill="#3b88c3"/>
  <!-- cross-eyes: two wide whites, pupils pulled toward the beak (left) -->
  <circle cx="11" cy="15" r="4.5" fill="#fff"/>
  <circle cx="19" cy="15" r="4.5" fill="#fff"/>
  <circle cx="13.2" cy="15.5" r="2" fill="#1a1a1a"/>
  <circle cx="16.8" cy="15.5" r="2" fill="#1a1a1a"/>
  <circle cx="13.9" cy="14.7" r="0.7" fill="#fff"/>
  <circle cx="17.5" cy="14.7" r="0.7" fill="#fff"/>
  <!-- gaping beak, pointing left -->
  <polygon points="6,14 1,16 6,17" fill="#f5a623"/>
  <polygon points="6,18 1,18 6,20" fill="#e8890c"/>
  <!-- legs/feet -->
  <g stroke="#e8890c" stroke-width="2" stroke-linecap="round">
    <line x1="16" y1="30" x2="16" y2="36"/>
    <line x1="22" y1="30" x2="22" y2="36"/>
    <line x1="13" y1="37" x2="19" y2="37"/>
    <line x1="19" y1="37" x2="25" y2="37"/>
  </g>
</svg>
